<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理系统 - Observatory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0B1120;
            --bg-card: #111827;
            --bg-card-hover: #151d2e;
            --border: #1F2937;
            --border-hover: #374151;
            --accent: #F59E0B;
            --accent-hover: #D97706;
            --accent-glow: rgba(245, 158, 11, 0.12);
            --accent-glow-strong: rgba(245, 158, 11, 0.25);
            --teal: #14B8A6;
            --teal-glow: rgba(20, 184, 166, 0.12);
            --success: #10B981;
            --success-glow: rgba(16, 185, 129, 0.12);
            --warning: #F59E0B;
            --warning-glow: rgba(245, 158, 11, 0.12);
            --error: #EF4444;
            --error-glow: rgba(239, 68, 68, 0.12);
            --info: #3B82F6;
            --info-glow: rgba(59, 130, 246, 0.12);
            --fg: #F9FAFB;
            --fg-secondary: #9CA3AF;
            --fg-muted: #6B7280;
            --sidebar-w: 240px;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --font-heading: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.45);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            color: var(--fg);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .mono { font-family: var(--font-mono); }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-mesh {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(245,158,11,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(20,184,166,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.02) 0%, transparent 60%);
            background-size: 200% 200%;
            animation: gradientShift 20s ease infinite;
            pointer-events: none;
            z-index: 0;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(245,158,11,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245,158,11,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        aside {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: var(--sidebar-w);
            background: rgba(11, 17, 32, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-logo {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo .logo-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(245,158,11,0.2);
        }
        .sidebar-logo .logo-icon i { color: #0B1120; font-size: 16px; }
        .sidebar-logo span {
            font-weight: 800;
            font-size: 15px;
            white-space: nowrap;
            letter-spacing: -0.5px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            color: var(--fg-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            position: relative;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 3px;
            height: 60%;
            border-radius: 0 3px 3px 0;
            background: var(--accent);
            transition: transform var(--transition);
            box-shadow: 0 0 8px rgba(245,158,11,0.4);
        }
        .nav-item:hover {
            color: var(--fg);
            background: rgba(245,158,11,0.06);
        }
        .nav-item.active {
            color: var(--accent);
            background: var(--accent-glow);
        }
        .nav-item.active::before {
            transform: translateY(-50%) scaleY(1);
        }
        .nav-item i { width: 20px; text-align: center; font-size: 15px; opacity: 0.7; transition: opacity var(--transition); }
        .nav-item:hover i { opacity: 1; }
        .nav-item.active i { opacity: 1; }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .mode-badge.local {
            background: rgba(245,158,11,0.1);
            color: var(--accent);
            border: 1px solid rgba(245,158,11,0.2);
        }
        .mode-badge.online {
            background: rgba(16,185,129,0.1);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.2);
        }
        .mode-badge .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .mode-badge.local .dot {
            background: var(--accent);
            box-shadow: 0 0 6px rgba(245,158,11,0.5);
        }
        .mode-badge.online .dot {
            background: var(--success);
            box-shadow: 0 0 6px rgba(16,185,129,0.5);
        }

        .sidebar-version {
            font-size: 11px;
            color: var(--fg-muted);
            opacity: 0.5;
        }

        .main-content {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 32px 36px;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.8px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--fg) 0%, var(--fg-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header p {
            color: var(--fg-muted);
            font-size: 14px;
        }

        .page { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .page.active { display: block; opacity: 1; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all var(--transition);
            backdrop-filter: blur(10px);
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 100px; height: 100px;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0;
            transition: opacity var(--transition);
            pointer-events: none;
        }
        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        .stat-card:hover::after { opacity: 0.1; }

        .stat-card.amber::after { background: var(--accent); }
        .stat-card.teal::after { background: var(--teal); }
        .stat-card.green::after { background: var(--success); }
        .stat-card.blue::after { background: var(--info); }

        .stat-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            font-size: 18px;
        }
        .stat-icon.amber { background: rgba(245,158,11,0.1); color: var(--accent); }
        .stat-icon.teal { background: rgba(20,184,166,0.1); color: var(--teal); }
        .stat-icon.green { background: rgba(16,185,129,0.1); color: var(--success); }
        .stat-icon.blue { background: rgba(59,130,246,0.1); color: var(--info); }

        .stat-value {
            font-size: 34px;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: -1px;
            margin-bottom: 2px;
        }
        .stat-label {
            font-size: 13px;
            color: var(--fg-secondary);
            font-weight: 500;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color var(--transition);
            backdrop-filter: blur(10px);
        }
        .card:hover { border-color: var(--border-hover); }
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .card-body { padding: 0; }
        .card-body.padded { padding: 24px; }

        .table-wrapper { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            text-align: left;
            padding: 12px 20px;
            background: rgba(17, 24, 39, 0.8);
            color: var(--fg-secondary);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 13px 20px;
            border-bottom: 1px solid rgba(31, 41, 55, 0.5);
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tbody tr:nth-child(even) td { background: rgba(245,158,11,0.01); }
        tbody tr:hover td { background: rgba(245,158,11,0.04); }
        tbody tr { transition: background 0.2s; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .badge-pending { background: rgba(245,158,11,0.1); color: var(--warning); }
        .badge-pending .badge-dot { background: var(--warning); box-shadow: 0 0 6px rgba(245,158,11,0.4); }
        .badge-paid { background: rgba(20,184,166,0.1); color: var(--teal); }
        .badge-paid .badge-dot { background: var(--teal); box-shadow: 0 0 6px rgba(20,184,166,0.4); }
        .badge-cancelled { background: rgba(239,68,68,0.1); color: var(--error); }
        .badge-cancelled .badge-dot { background: var(--error); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
        .badge-completed { background: rgba(16,185,129,0.1); color: var(--success); }
        .badge-completed .badge-dot { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,0.4); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            font-family: inherit;
            white-space: nowrap;
        }
        .btn i { font-size: 13px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: #0B1120;
            box-shadow: 0 2px 12px rgba(245,158,11,0.25);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(245,158,11,0.35);
        }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: rgba(17, 24, 39, 0.6);
            color: var(--fg);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: var(--radius-xs); }

        .btn-danger {
            background: var(--error-glow);
            color: var(--error);
            border: 1px solid rgba(239,68,68,0.15);
        }
        .btn-danger:hover {
            background: rgba(239,68,68,0.16);
            border-color: rgba(239,68,68,0.3);
        }

        .btn-success {
            background: var(--success-glow);
            color: var(--success);
            border: 1px solid rgba(16,185,129,0.15);
        }
        .btn-success:hover {
            background: rgba(16,185,129,0.16);
            border-color: rgba(16,185,129,0.3);
        }

        .btn-warning {
            background: var(--warning-glow);
            color: var(--warning);
            border: 1px solid rgba(245,158,11,0.15);
        }
        .btn-warning:hover {
            background: rgba(245,158,11,0.16);
            border-color: rgba(245,158,11,0.3);
        }

        .btn-info {
            background: var(--info-glow);
            color: var(--info);
            border: 1px solid rgba(59,130,246,0.15);
        }
        .btn-info:hover {
            background: rgba(59,130,246,0.16);
            border-color: rgba(59,130,246,0.3);
        }

        .btn-teal {
            background: var(--teal-glow);
            color: var(--teal);
            border: 1px solid rgba(20,184,166,0.15);
        }
        .btn-teal:hover {
            background: rgba(20,184,166,0.16);
            border-color: rgba(20,184,166,0.3);
        }

        .actions-cell {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .stock-bar {
            width: 80px;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }
        .stock-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .stock-bar-fill.high { background: var(--success); }
        .stock-bar-fill.medium { background: var(--warning); }
        .stock-bar-fill.low { background: var(--error); }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--fg-secondary);
            flex-wrap: wrap;
            gap: 12px;
        }
        .pagination-btns {
            display: flex;
            gap: 4px;
        }
        .pagination-btns button {
            padding: 6px 12px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--fg-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .pagination-btns button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }
        .pagination-btns button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .pagination-btns button.active {
            background: var(--accent);
            color: #0B1120;
            border-color: var(--accent);
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg), 0 0 40px rgba(245,158,11,0.03);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(12px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h3 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .modal-close {
            width: 32px; height: 32px;
            border-radius: var(--radius-xs);
            border: none;
            background: transparent;
            color: var(--fg-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
        }
        .modal-close:hover {
            background: var(--error-glow);
            color: var(--error);
        }

        .modal-body { padding: 24px; }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--fg-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-deep);
            color: var(--fg);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.25s;
            outline: none;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-group input::placeholder { color: var(--fg-muted); opacity: 0.5; }
        .form-group select option { background: var(--bg-deep); color: var(--fg); }
        .form-group .form-error {
            font-size: 12px;
            color: var(--error);
            margin-top: 4px;
            display: none;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 280px;
            max-width: 420px;
            animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }
        .toast::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            height: 3px;
            background: currentColor;
            opacity: 0.4;
            animation: toastProgress 3s linear forwards;
        }
        @keyframes toastProgress {
            from { width: 100%; }
            to { width: 0%; }
        }
        .toast.hiding {
            animation: toastOut 0.3s ease forwards;
        }
        .toast.hiding::after { animation: none; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(60px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(60px); }
        }
        .toast-success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.2); color: var(--success); }
        .toast-error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.2); color: var(--error); }
        .toast-info { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.2); color: var(--info); }

        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 250;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .confirm-overlay.show { display: flex; }
        .confirm-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
        }
        .confirm-icon {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
        }
        .confirm-icon.danger { background: var(--error-glow); color: var(--error); }
        .confirm-icon.warning { background: var(--warning-glow); color: var(--warning); }
        .confirm-box h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .confirm-box p {
            color: var(--fg-secondary);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--fg-muted);
        }
        .empty-state svg {
            width: 72px; height: 72px;
            margin-bottom: 16px;
            opacity: 0.2;
        }
        .empty-state p { font-size: 15px; font-weight: 500; }
        .empty-state p.sub { font-size: 13px; font-weight: 400; margin-top: 4px; opacity: 0.6; }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .detail-item { display: flex; flex-direction: column; gap: 4px; }
        .detail-item.full { grid-column: 1 / -1; }
        .detail-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .detail-value { font-size: 15px; font-weight: 500; }
        .detail-value.mono { font-family: var(--font-mono); }

        .order-create-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .status-tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(17,24,39,0.5);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .status-tab {
            padding: 6px 14px;
            border-radius: var(--radius-xs);
            font-size: 13px;
            font-weight: 500;
            color: var(--fg-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            font-family: inherit;
        }
        .status-tab:hover { color: var(--fg); background: rgba(255,255,255,0.03); }
        .status-tab.active {
            background: var(--accent);
            color: #0B1120;
            font-weight: 600;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .mobile-toggle {
            display: none;
            position: fixed;
            top: 14px; left: 14px;
            z-index: 150;
            width: 40px; height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--fg);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
        }
        .mobile-toggle:hover { border-color: var(--accent); color: var(--accent); }

        .loading-spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .table-loading { text-align: center; padding: 40px; }

        @media (max-width: 1024px) {
            .order-create-form { grid-template-columns: 1fr; }
            .detail-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            aside { transform: translateX(-100%); }
            aside.open { transform: translateX(0); }
            .mobile-toggle { display: flex; }
            .main-content { margin-left: 0; padding: 64px 16px 24px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

    <script>
    (function() {
        'use strict';

        const SEED_USERS = [
            { id: 1, username: '张三', phone: '13800138001' },
            { id: 2, username: '李四', phone: '13800138002' },
            { id: 3, username: '王五', phone: '13800138003' },
            { id: 4, username: '赵六', phone: '13800138004' }
        ];
        const SEED_PRODUCTS = [
            { id: 1, productName: 'iPhone 15', price: 5999.00, stock: 100 },
            { id: 2, productName: 'MacBook Pro', price: 12999.00, stock: 50 },
            { id: 3, productName: 'AirPods Pro', price: 1899.00, stock: 200 },
            { id: 4, productName: 'iPad Air', price: 4799.00, stock: 80 },
            { id: 5, productName: 'Apple Watch', price: 2999.00, stock: 120 }
        ];

        const LS_USERS = 'om_users';
        const LS_PRODUCTS = 'om_products';
        const LS_ORDERS = 'om_orders';
        const LS_INITIALIZED = 'om_initialized';

        let isApiMode = false;
        let productsCache = [];
        let usersCache = [];
        let allOrdersCache = [];
        let productPage = { pageNum: 1, pageSize: 10, total: 0, totalPages: 0 };
        let orderPage = { pageNum: 1, pageSize: 10, total: 0, totalPages: 0 };
        let orderStatusFilter = '';
        let confirmCallback = null;

        function getLS(key) {
            try { return JSON.parse(localStorage.getItem(key)) || null; } catch { return null; }
        }
        function setLS(key, val) {
            localStorage.setItem(key, JSON.stringify(val));
        }
        function initSeedData() {
            if (!getLS(LS_INITIALIZED)) {
                setLS(LS_USERS, SEED_USERS);
                setLS(LS_PRODUCTS, SEED_PRODUCTS);
                setLS(LS_ORDERS, []);
                setLS(LS_INITIALIZED, true);
            }
        }
        function nextId(arr) {
            if (!arr || arr.length === 0) return 1;
            return Math.max(...arr.map(i => i.id)) + 1;
        }
        function formatPrice(price) {
            return '¥' + Number(price).toFixed(2);
        }
        function formatTime(time) {
            if (!time) return '-';
            return time;
        }
        function nowStr() {
            const d = new Date();
            const pad = n => String(n).padStart(2, '0');
            return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }
        function statusBadge(status) {
            const map = {
                0: { cls: 'badge-pending', text: '待支付' },
                1: { cls: 'badge-paid', text: '已支付' },
                2: { cls: 'badge-cancelled', text: '已取消' },
                3: { cls: 'badge-completed', text: '已完成' }
            };
            const s = map[status] || { cls: 'badge-pending', text: '未知' };
            return '<span class="badge ' + s.cls + '"><span class="badge-dot"></span>' + s.text + '</span>';
        }
        function statusDesc(status) {
            const map = { 0: '待支付', 1: '已支付', 2: '已取消', 3: '已完成' };
            return map[status] || '未知';
        }
        function stockBarLevel(stock) {
            if (stock >= 100) return 'high';
            if (stock >= 30) return 'medium';
            return 'low';
        }

        async function api(url, options) {
            options = options || {};
            try {
                const res = await fetch(url, {
                    headers: { 'Content-Type': 'application/json' },
                    ...options
                });
                const json = await res.json();
                if (json.code !== 200) {
                    throw new Error(json.message || '操作失败');
                }
                return json.data;
            } catch (err) {
                if (err.message && !err.message.includes('Failed to fetch')) {
                    showToast(err.message, 'error');
                } else {
                    showToast('网络请求失败', 'error');
                }
                throw err;
            }
        }

        function showToast(message, type) {
            type = type || 'info';
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            const icons = {
                success: '<i class="fas fa-check-circle"></i>',
                error: '<i class="fas fa-times-circle"></i>',
                info: '<i class="fas fa-info-circle"></i>'
            };
            toast.innerHTML = (icons[type] || icons.info) + '<span>' + message + '</span>';
            container.appendChild(toast);
            setTimeout(function() {
                toast.classList.add('hiding');
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        function showConfirm(title, message, callback, type) {
            type = type || 'danger';
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-message').textContent = message;
            var icon = document.getElementById('confirm-icon');
            icon.className = 'confirm-icon ' + type;
            icon.innerHTML = type === 'danger' ? '<i class="fas fa-trash-alt"></i>' : '<i class="fas fa-exclamation-triangle"></i>';
            confirmCallback = callback;
            document.getElementById('confirm-dialog').classList.add('show');
        }
        function closeConfirm() {
            document.getElementById('confirm-dialog').classList.remove('show');
            confirmCallback = null;
        }
        function executeConfirm() {
            if (confirmCallback) confirmCallback();
            closeConfirm();
        }
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
            var pageEl = document.getElementById('page-' + page);
            if (pageEl) pageEl.classList.add('active');
            var navEl = document.querySelector('.nav-item[data-page="' + page + '"]');
            if (navEl) navEl.classList.add('active');
            if (page === 'dashboard') loadDashboard();
            if (page === 'products') loadProducts();
            if (page === 'users') loadUsers();
            if (page === 'orders') loadOrdersPage();
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function updateModeBadge() {
            var badge = document.getElementById('mode-badge');
            var text = document.getElementById('mode-text');
            if (isApiMode) {

        async function detectMode() {

                var timeoutId = setTimeout(function() { controller.abort(); }, 3000);
                var res = await fetch('/api/users', { method: 'GET', signal: controller.signal });
                clearTimeout(timeoutId);
                var json = await res.json();
                if (json.code === 200) {
                    isApiMode = true;
                } else {
                    isApiMode = false;
                }

        function getLocalProducts() { return getLS(LS_PRODUCTS) || []; }
        function getLocalOrders() { return getLS(LS_ORDERS) || []; }
        function saveLocalUsers(users) { setLS(LS_USERS, users); }
        function saveLocalProducts(products) { setLS(LS_PRODUCTS, products); }
        function saveLocalOrders(orders) { setLS(LS_ORDERS, orders); }

        function buildOrderDetail(order) {
            var users = isApiMode ? [] : getLocalUsers();
            var products = isApiMode ? [] : getLocalProducts();
            var user = users.find(function(u) { return u.id === order.userId; });
            var product = products.find(function(p) { return p.id === order.productId; });
            return {
                orderId: order.id,
                userId: order.userId,
                productId: order.productId,
                userName: user ? user.username : (order.userName || '-'),
                productName: product ? product.productName : (order.productName || '-'),
                quantity: order.quantity,
                totalPrice: order.totalPrice,
                status: order.status,
                statusDesc: statusDesc(order.status),
                orderTime: order.orderTime || order.createTime || '-'
            };
        }

        async function loadDashboard() {
            var totalUsers = 0, totalProducts = 0, totalOrders = 0, totalRevenue = 0;
            var recentOrders = [];

            if (isApiMode) {
                try {
                    var users = await api('/api/users');
                    totalUsers = users ? users.length : 0;
                    var productsData = await api('/api/products?pageNum=1&pageSize=1');
                    totalProducts = productsData ? productsData.total : 0;

                    for (var i = 0; i < (users || []).length; i++) {
                        try {
                            var od = await api('/api/orders/user/' + users[i].id + '?pageNum=1&pageSize=100');
                            if (od && od.list) {
                                totalOrders += od.total;
                                od.list.forEach(function(o) {
                                    if (o.status === 1 || o.status === 3) {
                                        totalRevenue += Number(o.totalPrice || 0);
                                    }
                                });
                                recentOrders = recentOrders.concat(od.list);
                            }
                        } catch {}
                    }
                } catch {}
            } else {
                var users = getLocalUsers();
                var products = getLocalProducts();
                var orders = getLocalOrders();
                totalUsers = users.length;
                totalProducts = products.length;
                totalOrders = orders.length;
                orders.forEach(function(o) {
                    if (o.status === 1 || o.status === 3) {
                        totalRevenue += Number(o.totalPrice || 0);
                    }
                });
                recentOrders = orders.map(function(o) { return buildOrderDetail(o); });

            document.getElementById('stat-products').textContent = totalProducts;
            document.getElementById('stat-orders').textContent = totalOrders;

                    closeModal('product-modal');
                    loadProducts();
                } catch {}
            } else {
                var products = getLocalProducts();
                if (id) {
                    var idx = products.findIndex(function(p) { return p.id === Number(id); });
                    if (idx !== -1) {
                        products[idx].productName = name;
                        products[idx].price = Number(price);
                        products[idx].stock = Number(stock);
                    }
                    showToast('商品更新成功', 'success');

        async function loadOrders() {
            var userId = document.getElementById('order-filter-user').value;
            var allDetails = [];

            if (isApiMode) {
                try {
                    if (userId) {
                        var data = await api('/api/orders/user/' + userId + '?pageNum=' + orderPage.pageNum + '&pageSize=' + orderPage.pageSize);
                        if (data) {
                            allDetails = data.list || [];
                            orderPage.total = data.total;
                            orderPage.totalPages = data.totalPages;
                        }
                    } else {
                        var users = await api('/api/users');
                        var allOrders = [];
                        for (var i = 0; i < (users || []).length; i++) {
                            try {
                                var od = await api('/api/orders/user/' + users[i].id + '?pageNum=1&pageSize=100');
                                if (od && od.list) allOrders = allOrders.concat(od.list);
                            } catch {}
                        }
                        allOrders.sort(function(a, b) { return (b.orderTime || '').localeCompare(a.orderTime || ''); });
                        if (orderStatusFilter !== '') {
                            allOrders = allOrders.filter(function(o) { return String(o.status) === String(orderStatusFilter); });
                        }
                        orderPage.total = allOrders.length;
                        orderPage.totalPages = Math.ceil(allOrders.length / orderPage.pageSize) || 1;
                        var start = (orderPage.pageNum - 1) * orderPage.pageSize;
                        allDetails = allOrders.slice(start, start + orderPage.pageSize);
                    }
                } catch {
                    allDetails = [];
                }
            } else {
                var orders = getLocalOrders();
                orders.forEach(function(o) { allDetails.push(buildOrderDetail(o)); });
                allDetails.sort(function(a, b) { return (b.orderTime || '').localeCompare(a.orderTime || ''); });

                if (userId) {
                    var uid = Number(userId);
                    allDetails = allDetails.filter(function(o) {
                        return o.userId === uid;
                    });
                }
                if (orderStatusFilter !== '') {
                    allDetails = allDetails.filter(function(o) { return String(o.status) === String(orderStatusFilter); });
                }

                orderPage.total = allDetails.length;
                orderPage.totalPages = Math.ceil(allDetails.length / orderPage.pageSize) || 1;
                var start = (orderPage.pageNum - 1) * orderPage.pageSize;
                allDetails = allDetails.slice(start, start + orderPage.pageSize);
            }

            renderOrdersTable(allDetails);
            renderOrdersPagination();
        }

            } else {
                var products = getLocalProducts();
                var product = products.find(function(p) { return p.id === Number(productId); });
                if (!product) { showToast('商品不存在', 'error'); return; }
                if (product.stock < Number(quantity)) { showToast('库存不足，当前库存: ' + product.stock, 'error'); return; }

                var orders = getLocalOrders();
                var newOrder = {
                    id: nextId(orders),
                    userId: Number(userId),
                    productId: Number(productId),
                    quantity: Number(quantity),
                    totalPrice: Number(quantity) * product.price,
                    status: 0,
                    orderTime: nowStr()
                };
                orders.push(newOrder);
                saveLocalOrders(orders);

                product.stock -= Number(quantity);
                saveLocalProducts(products);

                showToast('订单创建成功', 'success');
                document.getElementById('order-quantity').value = '1';
                document.getElementById('order-user').value = '';
                document.getElementById('order-product').value = '';
                loadOrders();
                loadOrderFormSelects();
            }
        }

        async function viewOrderDetail(id) {
            var order;
            if (isApiMode) {
                try {
                    order = await api('/api/orders/' + id);
                } catch { return; }
            } else {
                var orders = getLocalOrders();
                var o = orders.find(function(or) { return or.id === id; });
                if (!o) { showToast('订单不存在', 'error'); return; }
                order = buildOrderDetail(o);
            }

            var body = document.getElementById('order-detail-body');
            var footer = document.getElementById('order-detail-footer');

            body.innerHTML = '<div class="detail-grid">' +
                '<div class="detail-item"><span class="detail-label">订单号</span><span class="detail-value mono">#' + order.orderId + '</span></div>' +
                '<div class="detail-item"><span class="detail-label">状态</span><span class="detail-value">' + statusBadge(order.status) + '</span></div>' +
                '<div class="detail-item"><span class="detail-label">用户</span><span class="detail-value">' + (order.userName || '-') + '</span></div>' +
                '<div class="detail-item"><span class="detail-label">商品</span><span class="detail-value">' + (order.productName || '-') + '</span></div>' +
                '<div class="detail-item"><span class="detail-label">数量</span><span class="detail-value mono">' + order.quantity + '</span></div>' +
                '<div class="detail-item"><span class="detail-label">总价</span><span class="detail-value mono" style="color:var(--accent);font-size:18px;">' + formatPrice(order.totalPrice) + '</span></div>' +
                '<div class="detail-item full"><span class="detail-label">下单时间</span><span class="detail-value mono" style="font-size:13px;">' + formatTime(order.orderTime) + '</span></div>' +
                '</div>';

            var actions = '<button class="btn btn-secondary" onclick="closeModal(\'order-detail-modal\')">关闭</button>';
            if (order.status === 0) {
                actions += '<button class="btn btn-success" onclick="window._app.payOrder(' + order.orderId + ');closeModal(\'order-detail-modal\')">支付</button>';
                actions += '<button class="btn btn-warning" onclick="window._app.cancelOrder(' + order.orderId + ');closeModal(\'order-detail-modal\')">取消</button>';
            }
            if (order.status === 1) {
                actions += '<button class="btn btn-teal" onclick="window._app.completeOrder(' + order.orderId + ');closeModal(\'order-detail-modal\')">完成</button>';
            }
            footer.innerHTML = actions;
            openModal('order-detail-modal');
        }

        async function payOrder(id) {
            if (isApiMode) {
                try {
                    await api('/api/orders/' + id + '/pay', { method: 'PUT' });
                    showToast('订单支付成功', 'success');
                    loadOrders();
                } catch {}
            } else {
                var orders = getLocalOrders();
                var order = orders.find(function(o) { return o.id === id; });
                if (!order) { showToast('订单不存在', 'error'); return; }
                if (order.status !== 0) { showToast('只有待支付订单才能支付', 'error'); return; }
                order.status = 1;
                saveLocalOrders(orders);
                showToast('订单支付成功', 'success');
                loadOrders();
            }
        }

        function cancelOrder(id) {
            showConfirm('取消订单', '确定要取消此订单吗？取消后库存将归还。', async function() {
                if (isApiMode) {
                    try {
                        await api('/api/orders/' + id + '/cancel', { method: 'PUT' });
                        showToast('订单已取消', 'success');
                        loadOrders();
                    } catch {}
                } else {
                    var orders = getLocalOrders();
                    var order = orders.find(function(o) { return o.id === id; });
                    if (!order) { showToast('订单不存在', 'error'); return; }
                    if (order.status !== 0) { showToast('只有待支付订单才能取消', 'error'); return; }
                    order.status = 2;
                    saveLocalOrders(orders);

                    var products = getLocalProducts();
                    var product = products.find(function(p) { return p.id === order.productId; });
                    if (product) {
                        product.stock += order.quantity;
                        saveLocalProducts(products);
                    }

                    showToast('订单已取消', 'success');
                    loadOrders();
                    loadOrderFormSelects();
                }
            }, 'warning');
        }

        async function completeOrder(id) {
            if (isApiMode) {
                try {
                    await api('/api/orders/' + id + '/complete', { method: 'PUT' });
                    showToast('订单已完成', 'success');
                    loadOrders();
                } catch {}
            } else {
                var orders = getLocalOrders();
                var order = orders.find(function(o) { return o.id === id; });
                if (!order) { showToast('订单不存在', 'error'); return; }
                if (order.status !== 1) { showToast('只有已支付订单才能完成', 'error'); return; }
                order.status = 3;
                saveLocalOrders(orders);
                showToast('订单已完成', 'success');
                loadOrders();
            }
        }

        document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) overlay.classList.remove('show');
            });
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.show, .confirm-overlay.show').forEach(function(el) {
                    el.classList.remove('show');
                });
                confirmCallback = null;
            }
        });

        window._app = {
            editProduct: editProduct,
            deleteProduct: deleteProduct,
            goProductPage: goProductPage,
            editUser: editUser,
            deleteUser: deleteUser,
            goOrderPage: goOrderPage,
            viewOrderDetail: viewOrderDetail,
            payOrder: payOrder,
            cancelOrder: cancelOrder,
            completeOrder: completeOrder
        };

        window.navigateTo = navigateTo;
        window.toggleSidebar = toggleSidebar;
        window.openProductModal = openProductModal;
        window.openUserModal = openUserModal;
        window.saveProduct = saveProduct;
        window.saveUser = saveUser;
        window.createOrder = createOrder;
        window.closeModal = closeModal;
        window.loadOrders = loadOrders;
        window.filterOrderStatus = filterOrderStatus;
        window.closeConfirm = closeConfirm;
        window.executeConfirm = executeConfirm;

        detectMode().then(function() {
            loadDashboard();
        });
    })();
    </script>
</body>
</html>
